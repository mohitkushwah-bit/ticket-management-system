services:
  db:
    image: postgres:16-alpine
    container_name: tms-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/database/seeds/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tms-backend
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: db
    ports:
      - '${PORT:-3001}:3001'
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tms-frontend
    env_file:
      - ./frontend/.env
    ports:
      - '5173:5173'
    depends_on:
      - backend

volumes:
  postgres_data:
